name: Development CI/CD

on:
  push:
    branches:
      - development

jobs:
  build:
    name: Build and Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Build Project
        run: yarn build

  create-pull-request:
    name: Create PR to Main
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Create and Auto-merge PR
        run: |
          set -euo pipefail

          # Create PR if it doesn't exist (gh exits non-zero if it already exists)
          gh pr create \
            --base main \
            --head development \
            --title "🚀 Auto PR: Development to Main" \
            --body "Build successful. Auto-created PR from development branch." \
            || true

          # Find the open PR from development -> main and merge it
          PR_NUMBER="$(gh pr list --base main --head development --state open --json number -q '.[0].number')"

          if [ -z "${PR_NUMBER}" ] || [ "${PR_NUMBER}" = "null" ]; then
            echo "No open PR found from development to main; nothing to merge."
            exit 0
          fi

          gh pr merge "${PR_NUMBER}" --squash --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
