name: Development CI/CD

on:
  push:
    branches:
      - development

jobs:
  build:
    name: Build and Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Build Project
        run: yarn build

  create-pull-request:
    name: Create PR to Main
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create and Auto-merge PR
        run: |
          gh pr create \
            --base main \
            --head development \
            --title "🚀 Auto PR: Development to Main" \
            --body "Build successful. Auto-created PR from development branch." \
            || echo "PR already exists"
          
          gh pr merge development \
            --base main \
            --squash \
            --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}